name: Release

# Se dispara al publicar un tag vX.Y.Z, o manualmente indicando un tag. Verifica,
# crea el GitHub Release (idempotente), publica la imagen en GHCR y, si hay token,
# en npm.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (p. ej. v2.2.2)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publicar release
    runs-on: ubuntu-latest
    steps:
      - name: Determinar el tag
        id: t
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.t.outputs.tag }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Instalar y verificar
        run: |
          npm install
          npm run check

      - name: Crear GitHub Release (si no existe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.t.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "El Release $TAG ya existe; no se vuelve a crear."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nombre del repo en minúsculas (GHCR lo exige)
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.t.outputs.tag }}
            ghcr.io/${{ steps.repo.outputs.name }}:latest

      - name: Publicar en npm (si hay NPM_TOKEN)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Sin NPM_TOKEN configurado: se omite la publicación en npm."
            exit 0
          fi
          npm publish --access public
